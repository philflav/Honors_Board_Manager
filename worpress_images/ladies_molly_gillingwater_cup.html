<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LADIES MOLLY GILLINGWATER CUP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Playfair+Display:wght@400;600&display=swap');

  body {
    margin: 0;
    padding: 0;
    background-color: #ffffff; /* Template's white space background */
  }

  .signage-wrapper {
    width: 100vw;
    height: 100vh;
    box-sizing: border-box;
    padding: 1vh 1vw;
    background-color: transparent;
  }

  .signage-plaque {
    background: #0f172a;
    background-image: radial-gradient(circle at top center, #1e293b 0%, #020617 100%);
    border: 0.6vh solid #856527;
    border-image: linear-gradient(135deg, #d4af37, #856527, #f3d686, #856527) 1;
    
    width: 100%;
    height: 100%;
    min-height: 94vh;
    
    padding: 2vh 2vw 3vh 2vw; 
    box-sizing: border-box;
    position: relative;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
    font-family: 'Playfair Display', serif;
  }

  .signage-plaque::before {
    content: "";
    position: absolute;
    top: 1.5vh; left: 1.5vh; right: 1.5vh; bottom: 1.5vh;
    border: 1px solid rgba(212, 175, 55, 0.3);
    pointer-events: none;
  }

  /* --- HEADER STYLING --- */
  .hb-header {
    text-align: center;
    margin-bottom: 2.5vh; 
    position: relative;
    z-index: 2;
  }

  .hb-title {
    font-family: 'Cinzel', serif;
    color: #d4af37;
    font-size: 3vw; 
    margin: 0 0 0.5vh 0;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 700;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
  }

  /* --- VERTICAL COLUMN LAYOUT --- */
  .hb-grid {
    column-count: 5;
    column-gap: 3vw;
    column-rule: 1px solid rgba(212, 175, 55, 0.2);
    
    position: relative;
    z-index: 2;
    width: 100%;
    
    /* STRICT ROW LIMIT: 
       84vh perfectly fits 24 rows at 3.5vh per row (3.2vh height + 0.3vh margin). 
       Capacity is 5 columns x 24 rows = 120 slots. */
    height: 84vh; 
    overflow: hidden; 
  }

  .hb-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    
    /* Strict sizing to maintain the 24 row math */
    height: 3.2vh; 
    margin-bottom: 0.3vh;
    border-bottom: 1px dotted rgba(212, 175, 55, 0.2);
    
    break-inside: avoid;
    page-break-inside: avoid;
  }

  .hb-year {
    color: #d4af37;
    font-weight: 700;
    font-family: 'Cinzel', serif;
    font-size: 1.05vw; 
  }

  .hb-name {
    color: #f8fafc;
    font-weight: 400;
    font-size: 1.05vw; 
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-left: 0.5vw;
  }
</style>
</head>
<body>

<div class="signage-wrapper">
  <div class="signage-plaque">
    <div class="hb-header">
      <h1 class="hb-title">LADIES MOLLY GILLINGWATER CUP</h1>
    </div>
    <div class="hb-grid">
          <div class="hb-row">
            <span class="hb-year">2025</span>
            <span class="hb-name">Janine Moore</span>
          </div>
          <div class="hb-row">
            <span class="hb-year">2024</span>
            <span class="hb-name">Katie Burrows</span>
          </div>
          <div class="hb-row">
            <span class="hb-year">2023</span>
            <span class="hb-name">Janine Moore</span>
          </div>
          <div class="hb-row">
            <span class="hb-year">2022</span>
            <span class="hb-name">Sue Jewkes</span>
          </div>
          <div class="hb-row">
            <span class="hb-year">2021</span>
            <span class="hb-name">Talia Brewer</span>
          </div>
          <div class="hb-row">
            <span class="hb-year">2020</span>
            <span class="hb-name">Ms G Smith</span>
          </div>
          <div class="hb-row">
            <span class="hb-year">2019</span>
            <span class="hb-name">Mrs K Ward</span>
          </div>
          <div class="hb-row">
            <span class="hb-year">2018</span>
            <span class="hb-name">Ms Fiona Todd</span>
          </div>
          <div class="hb-row">
            <span class="hb-year">2017</span>
            <span class="hb-name">Ms Di Hegarty</span>
          </div>
          <div class="hb-row">
            <span class="hb-year">2016</span>
            <span class="hb-name">Mrs Kim Ward</span>
          </div>
          <div class="hb-row">
            <span class="hb-year">2004</span>

          <div class="hb-row">

          </div>
          <div class="hb-row">
            <span class="hb-year">1987</span>

          </div>
    </div>
  </div>
</div>

</body>
</html>
